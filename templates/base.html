<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <title>Bootstrap 4 Website Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="{% static 'css/bootstrap.min.css' %}"
    />
    <script src="{% static 'js/jquery.slim.min.js' %}"></script>
    <script src="{% static 'js/popper.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <style>
      body {
        background: #f4f6fb;
        font-family: Arial, sans-serif;
      }

      /* Titles */
      .section-title {
        font-weight: bold;
        color: #3b2dbf;
        margin-bottom: 15px;
      }

      /* Media cards */
      .media-box {
        border: 1px solid #ddd;
        background: #fff;
        padding: 15px;
        text-align: center;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
      }

      .media-box:hover {
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      }

      /* Wikipedia terms */
      .term {
        color: #d63384;
        font-weight: 600;
        cursor: pointer;
        border-bottom: 1px dotted;
      }

      /* Sidebar */
      .sidebar-card {
        background: #fff;
        padding: 15px;
        border-radius: 10px;
      }

      /* Accordion */
      .card-header {
        background: #4a3aff !important;
        color: #fff !important;
      }

      .card-header a {
        color: white !important;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="jumbotron text-center" style="margin-bottom: 0">
      <h5><a href="{% url 'article:home' %}">My First Bootstrap 4 Page</a></h5>
      <p>Resize this responsive page to see the effect!</p>
    </div>

    <div class="container" style="margin-top: 30px">
      {% block content %}{% endblock content %}
    </div>

    <div class="jumbotron text-center" style="margin-bottom: 0">
      <p>Footer</p>
    </div>
  </body>
  <script>
    function openContent(id) {
      fetch(`/content/${id}/`)
        .then((res) => res.json())
        .then((data) => {
          let html = "";

          if (data.type === "text") {
            html = `<p>${data.text}</p>`;
          } else if (data.type === "image") {
            html = `<img src="${data.file}" class="img-fluid"/>`;
          } else if (data.type === "audio") {
            html = `<audio controls src="${data.file}"></audio>`;
          } else if (data.type === "video") {
            html = `<video controls class="w-100"><source src="${data.file}"></video>`;
          } else if (data.type === "youtube") {
            html += `<iframe width="100%" height="400"
            src="https://www.youtube.com/embed/${data.youtube_id}"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
            referrerpolicy="strict-origin-when-cross-origin"> <!-- Add this line -->
        </iframe>`;
          }

          document.getElementById("modalHeader").innerHTML = data.title;
          document.getElementById("modalContent").innerHTML = html;
          $("#contentModal").modal("show");
        });
    }

    document.addEventListener("click", function (e) {
      if (e.target.classList.contains("term")) {
        let id = e.target.dataset.id;

        fetch(`/term/${id}/`)
          .then((res) => res.json())
          .then((data) => {
            let html = ``;

            data.contents.forEach((c) => {
              if (c.type === "text") {
                html += `<p>${c.text}</p>`;
              }

              if (c.type === "image") {
                html += `<img src="${c.file}" class="img-fluid mb-2"/>`;
              }

              if (c.type === "audio") {
                html += `<audio controls src="${c.file}"></audio>`;
              }

              if (c.type === "video") {
                html += `<video controls class="w-100"><source src="${c.file}"></video>`;
              }

              if (c.type === "youtube") {
                html += `<iframe width="100%" height="400"
                src="https://www.youtube.com/embed/${c.youtube_id}"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen
                referrerpolicy="strict-origin-when-cross-origin"> <!-- Add this line -->
            </iframe>`;
              }
            });

            document.getElementById("modalHeader").innerHTML = data.word;
            document.getElementById("modalContent").innerHTML = html;
            $("#contentModal").modal("show");
          });
      }
    });
  </script>
</html>
