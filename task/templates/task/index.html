{% extends 'base.html' %} {% block content %}
<div class="row">
  <div class="col-sm-12">
    <h2>Latest Article</h2>
    <ul>
      {% for article in articles %}
      <li>
        <a href="{% url 'article:detail' article.id %}">{{ article.title }}</a>
      </li>
      {% endfor %}
    </ul>
  </div>
</div>
{% endblock content %}
